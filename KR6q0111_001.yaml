body:
  text: 和三點言是何物子言是佛和言佛是西國梵語此土名覺所言覺義者謂心體離念離念相者等虛空界無所不遍已上為覺義法界一相已上覺他即是如來平等法身是名覺滿依此法身説名本覺名三覺和言覺是沒答覺是離離是離念一一離色心俱離和言色是何答是身身心俱離一時遍離一切常離和言子得離不答得離離離是佛佛是沒佛是覺覺有三種一自覺二覺他三覺滿釋離心名自覺離色名覺他心色俱離名覺滿滿者謂一念離一切離無離無不離即是滿淨如來梵言盧舍此云光明遍照平等法性依此法性説名本離是略名釋三覺義廣釋三覺如上側注離念文中通離念相和問有相無相子言無相釋云相無所相即是實相是名離相通等虛空界釋虛空無心離念無心與虛空合是名等虛空界散虛中無中邊諸佛身亦然心同虛空遍一切通無所不遍釋虛空無心遍一切離念無心遍一切是名無所不遍通法界一相和問法是沒子言意知名法意知五根法所到名界眼見色意用知染法界心不起不同知淨法界餘根準上以通六根陀羅尼出佛名經第六卷若自在並名佛和言佛是何子言是覺覺是離眼離一切色名眼陀羅尼自在餘準上眼見色意用知染法界心不起不同知淨法界悉攝一切色塵是名總持度門是名自在餘準上眼界色界眼識界餘根準上通界是藏義此中含容無邊廣大功德如唯識云此是無漏界當善含容無邊功德通法界一相一相謂無相無相沒相沒相是無相即是實相是名法界一相六根解脫門云眼空無我無我所性自空餘準上耳根無我無我所性自空餘準上通如來平等法身釋離心心如離色色如心色俱如即是如來平等法身有五種法身出大通方廣經中卷末一實相法身相無所相故二功德法身離念為功顯理為德三法性法身諸法性離四應化法身六根無染也五虛空法身等虛空界體依聚義通體依聚總説名身離心名體離色名依俱離名聚義通本覺始覺離念名本覺理佛法性離色名始覺事佛性色心俱離性相圓融理事俱通無礙是名總結三覺義義正通覺傍通云就事理若離心貪不起離色嗔不生色心俱離愚癡不現又離心出欲界離色出色界俱離出無色界通貪嗔癡釋所言覺義者為心體離念離念相者等虛空界無所不遍是名自覺離嗔相者等虛空界無所不遍名覺他離癡相者等虛空無所不遍法界一相即是如來平等法身是名覺滿通三界義所言覺義者為心體離欲離欲者等虛空界無所不遍是自覺離色界相準上名覺他離無色界相準上名覺滿是名三毒出三界通三解脫門離心入空解脫門離色入無相解脫門俱離入無願解脫門通五法義離心名不起離色相不生俱離即無妄想離心即正智雜色即如如俱離即正智如如通三自性離心妄相自性不起離色緣起自性不起俱離即是成自性通二無我離心得人無我離色得法無我俱離即得二無我智通三忍本性無生忍自然無生忍或苦無生忍離心證得本性無生忍離色得自然無生忍俱離即證得或苦無生忍通三德義修斷顯摩訶般若解脫法身離心即顯理大智慧謂摩訶般若離色即顯解脫俱離顯得法身通三身化報法離心即得化身離色得報身俱離得法身通六波羅蜜施有三財施無畏施法施離心即財施離色無畏施俱離名法施或有三攝衆生攝善法攝律儀離心攝妄衆生化離色攝散善報俱離得一切律儀法忍有三耐怨害忍安受苦忍諦察法忍離心得上離色得中俱離得下精進三被甲攝善利樂離心得被甲離色得攝善俱離得利樂禪有三安住靜慮辨事靜慮引發靜慮離心得安住離色得引發俱離得辨事惠有三生空無分別惠法空無分別惠俱空無分別惠離心得生空無分別惠離色得次俱離得下常依此三修行又傍通三覺斷三毒出三界入三解脫門離三性得二無我證三生顯三德成三身已上第一方便正義傍通語竟名總彰佛體皆以離心離色通一切故名總彰五根總是惠門見聞覺知總數通色釋意根不動是智門意識不動是開智慧門總結竟若不得方便正不動是正動即落邪定貪著禪味墮二乘涅槃不動以得方便正定即圓寂是大涅槃通大涅槃是圓滿圓滿是大涅槃色不動圓滿心不動是智用是知色不動是慧用是見俱不動是開佛知見得大涅槃涅槃是不動知見是正語第二入維摩經通經第三皆以心不思口不議通一切法從諸解脫至入不二法門於眼入遠塵於色起離垢示現法不思議諸天世人莫能知了無於色法入離垢於眼起遠塵觀眼無生無自性説空寂滅無所有了無異又於眼根中入正受根不礙塵於色法中三昧起塵不礙根已上了無異又於眼入無礙道於色法中三昧起解脫道又於眼根中入正受等覺於色法中三昧起妙覺又於眼根中入正受理佛性於色法中三昧起事佛性讚禪門詩一首丈六誰迹三世欽菩提理絶去來今欲升彼岸無學道一切都緣草計心丁卯年二月二十三日沙彌明慧記
